<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>♥ Notre Aventure ♥</title>
  <style>
    /* ── Reset & fond romantique ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a0020;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Particules CSS en fond (pétales de rose) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(180,0,80,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(120,0,150,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #game-container {
      position: relative;
      z-index: 1;
    }

    /* Overlay d'écran (Game Over / Victoire) */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(10, 0, 20, 0.85);
      backdrop-filter: blur(6px);
    }
    #overlay.show { display: flex; }

    #overlay-box {
      background: linear-gradient(135deg, #2d0040 0%, #5a0060 50%, #2d0040 100%);
      border: 2px solid #ff69b4;
      border-radius: 20px;
      padding: 40px 50px;
      text-align: center;
      max-width: 520px;
      box-shadow: 0 0 40px rgba(255,105,180,0.5), inset 0 0 30px rgba(255,105,180,0.1);
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #overlay-title {
      font-size: 2.8rem;
      color: #ff69b4;
      text-shadow: 0 0 20px #ff1493, 0 0 40px #ff1493;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    #overlay-subtitle {
      font-size: 1rem;
      color: #ffaad4;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    #overlay-message {
      font-size: 1.25rem;
      color: #fff0f8;
      font-style: italic;
      margin-bottom: 28px;
      line-height: 1.7;
      padding: 14px 18px;
      border-radius: 10px;
      background: rgba(255,105,180,0.1);
      border-left: 3px solid #ff69b4;
      white-space: pre-line;
    }

    #btn-replay {
      background: linear-gradient(90deg, #e91e8c, #9c27b0);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      padding: 12px 36px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(233,30,140,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #btn-replay:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(233,30,140,0.7);
    }
    #btn-replay:active { transform: scale(0.97); }

    /* Floating hearts déco */
    .heart-float {
      position: fixed;
      pointer-events: none;
      font-size: 1.4rem;
      animation: floatUp 4s ease-in infinite;
      z-index: 99;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)   rotate(0deg);   opacity: 0.8; }
      100% { transform: translateY(-110vh) rotate(30deg); opacity: 0;   }
    }
  </style>
</head>
<body>

  <!-- Coeurs flottants decoratifs -->
  <div class="heart-float" style="left:5%;  animation-delay:0s;   animation-duration:5s;">♥</div>
  <div class="heart-float" style="left:15%; animation-delay:1.2s; animation-duration:4.5s;">💕</div>
  <div class="heart-float" style="left:30%; animation-delay:2.5s; animation-duration:6s;">♡</div>
  <div class="heart-float" style="left:55%; animation-delay:0.7s; animation-duration:4s;">💗</div>
  <div class="heart-float" style="left:70%; animation-delay:3s;   animation-duration:5.5s;">♥</div>
  <div class="heart-float" style="left:85%; animation-delay:1.8s; animation-duration:4.8s;">💖</div>
  <div class="heart-float" style="left:92%; animation-delay:0.3s; animation-duration:3.8s;">♡</div>

  <!-- Conteneur du jeu Phaser -->
  <div id="game-container"></div>

  <!-- Overlay Game Over / Victoire -->
  <div id="overlay">
    <div id="overlay-box">
      <div id="overlay-title">💖</div>
      <div id="overlay-subtitle"></div>
      <div id="overlay-message"></div>
      <button id="btn-replay">↺ Rejouer</button>
    </div>
  </div>

  <!-- Phaser 3 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <!-- Notre jeu -->
  <script src="main.js"></script>
</body>
</html>
